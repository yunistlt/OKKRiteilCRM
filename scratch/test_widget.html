<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test Page</title>
    <style>
        body {
            height: 2000px; /* Enable scrolling to test fixed position */
            background: #f0f2f5;
            padding: 50px;
            font-family: sans-serif;
        }
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .cookie-banner button {
            background: #10b981;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Тестовая страница для виджета Елены</h1>
    <p>Прокрутите вниз, чтобы проверить поведение виджета.</p>

    <!-- Имитация плашки куки -->
    <div class="cookie-banner">
        <span>Мы используем куки для улучшения работы сайта.</span>
        <button>Согласен</button>
    </div>

    <!-- Рекомендуемый код блока Webasyst -->
    <div id="okk-chat-widget" class="minimized">
        <div id="okk-chat-header">
            <div class="agent-info">
                <img src="/images/agents/elena.png" alt="Елена" class="agent-avatar">
                <div>
                    <div>Елена (ЗМК)</div>
                    <div class="agent-status">В сети • Продуктолог</div>
                </div>
            </div>
            <span id="okk-chat-toggle">▲</span>
        </div>
        
        <div id="okk-chat-messages">
            <!-- Сообщения появятся здесь -->
        </div>

        <div id="okk-chat-input-area">
            <button id="okk-chat-file-btn" title="Прикрепить файл">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.5,6V17.5A4,4 0 0,1 12.5,21.5A4,4 0 0,1 8.5,17.5V5A2.5,2.5 0 0,1 11,2.5A2.5,2.5 0 0,1 13.5,5V15.5A1,1 0 0,1 12.5,16.5A1,1 0 0,1 11.5,15.5V6H10V15.5A2.5,2.5 0 0,0 12.5,18A2.5,2.5 0 0,0 15,15.5V5A4,4 0 0,0 11,1A4,4 0 0,0 7,5V17.5A5.5,5.5 0 0,0 12.5,23A5.5,5.5 0 0,0 18,17.5V6H16.5Z" /></svg>
            </button>
            <input type="file" id="okk-chat-file-input" style="display: none;">
            
            <input type="text" id="okk-chat-input" placeholder="Введите ваш вопрос...">
            
            <button id="okk-chat-send" title="Отправить">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
            </button>
        </div>
    </div>

    <!-- Путь к скрипту (для локального теста мы используем относительный путь) -->
    <!-- В реальности будет /widget/okk-chat.js -->
    <script src="../public/widget/okk-chat.js"></script>
</body>
</html>
