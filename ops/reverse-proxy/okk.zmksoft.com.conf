# Reverse proxy для обхода DPI-фильтрации Vercel в РФ.
# Путь: пользователь (РФ) -> этот VPS (РФ, nginx) -> Vercel.
#
# DNS:  okk.zmksoft.com  A  <IP_ЭТОГО_VPS>
# Файл: /etc/nginx/sites-available/okk.zmksoft.com  (симлинк в sites-enabled)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP: ACME-челлендж + редирект на HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name okk.zmksoft.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: терминируем TLS здесь, проксируем на Vercel ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name okk.zmksoft.com;

    # Сертификат Let's Encrypt, выпущенный на этом VPS (DNS уже указывает сюда)
    ssl_certificate     /etc/letsencrypt/live/okk.zmksoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okk.zmksoft.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # HSTS отдаёт сам апстрим (Vercel) — здесь не дублируем

    # Загрузки (юр-OCR, договоры и т.п.)
    client_max_body_size 50m;

    location / {
        # Vercel маршрутизирует по заголовку Host; коннектимся к стабильному anycast-IP Vercel.
        proxy_pass https://76.76.21.21;

        # Vercel должен видеть реальный домен — для роутинга в проект и корректных URL
        proxy_set_header Host okk.zmksoft.com;

        # TLS до Vercel: SNI = наш домен (без слова "vercel" для DPI), цепочку не проверяем
        proxy_ssl_server_name on;
        proxy_ssl_name        okk.zmksoft.com;
        proxy_ssl_verify      off;

        # Проброс информации о клиенте
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host okk.zmksoft.com;

        # WebSocket (мессенджер)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Таймауты (серверные функции Vercel бывают долгими)
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Не кэшировать ответы авторизованных пользователей
        proxy_buffering off;
    }
}
